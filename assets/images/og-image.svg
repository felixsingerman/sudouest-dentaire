<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A96E"/>
      <stop offset="50%" style="stop-color:#E8D5B0"/>
      <stop offset="100%" style="stop-color:#C9A96E"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0c0c"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle gold radial glow -->
  <ellipse cx="600" cy="280" rx="400" ry="200" fill="#C9A96E" opacity="0.06"/>

  <!-- Top decorative line -->
  <line x1="500" y1="160" x2="700" y2="160" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>

  <!-- Eyebrow text -->
  <text x="600" y="210" text-anchor="middle" fill="#C9A96E" font-family="Georgia, serif" font-size="16" letter-spacing="8" opacity="0.8">CLINIQUE DENTAIRE</text>

  <!-- Main wordmark -->
  <text x="600" y="300" text-anchor="middle" fill="url(#gold)" font-family="Georgia, serif" font-size="80" font-style="italic" font-weight="400" letter-spacing="6">Sud Ouest</text>

  <!-- Bottom decorative line -->
  <line x1="500" y1="340" x2="700" y2="340" stroke="url(#gold)" stroke-width="1" opacity="0.5"/>

  <!-- Tagline -->
  <text x="600" y="390" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="300" opacity="0.7" letter-spacing="3">VOTRE SOURIRE, NOTRE PASSION</text>

  <!-- Contact info -->
  <text x="600" y="470" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="15" opacity="0.4" letter-spacing="2">1825 AVENUE DE L'ÉGLISE, MONTRÉAL</text>
  <text x="600" y="500" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="15" opacity="0.4" letter-spacing="2">514 767 2254</text>

  <!-- Corner accents -->
  <line x1="40" y1="40" x2="100" y2="40" stroke="#C9A96E" stroke-width="1" opacity="0.3"/>
  <line x1="40" y1="40" x2="40" y2="100" stroke="#C9A96E" stroke-width="1" opacity="0.3"/>
  <line x1="1160" y1="40" x2="1100" y2="40" stroke="#C9A96E" stroke-width="1" opacity="0.3"/>
  <line x1="1160" y1="40" x2="1160" y2="100" stroke="#C9A96E" stroke-width="1" opacity="0.3"/>
  <line x1="40" y1="590" x2="100" y2="590" stroke="#C9A96E" stroke-width="1" opacity="0.3"/>
  <line x1="40" y1="590" x2="40" y2="530" stroke="#C9A96E" stroke-width="1" opacity="0.3"/>
  <line x1="1160" y1="590" x2="1100" y2="590" stroke="#C9A96E" stroke-width="1" opacity="0.3"/>
  <line x1="1160" y1="590" x2="1160" y2="530" stroke="#C9A96E" stroke-width="1" opacity="0.3"/>
</svg>
