<!DOCTYPE html>
<html lang="fr" translate="no">
<head>
  <meta charset="UTF-8">
  <meta name="google" content="notranslate">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page introuvable | Clinique Dentaire Sud Ouest</title>
  <meta name="description" content="La page que vous cherchez n'existe pas ou a été déplacée.">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">

  <meta name="theme-color" content="#0c0c0c">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/variables.css?v=4">
  <link rel="stylesheet" href="css/styles.css?v=4">
  <link rel="stylesheet" href="css/animations.css?v=4">
  <link rel="stylesheet" href="css/responsive.css?v=4">

  <style>
    body {
      background: var(--black, #0c0c0c);
      margin: 0;
    }
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .error-wordmark {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: 400;
      color: var(--gold, #c8a86e);
      line-height: 1;
      margin-bottom: 2.5rem;
      letter-spacing: 0.04em;
    }
    .error-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.5rem, 3vw, 2.25rem);
      font-weight: 400;
      color: var(--white, #fff);
      margin: 0 0 1rem;
    }
    .error-subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      font-weight: 300;
      color: var(--text-secondary, rgba(255,255,255,0.6));
      max-width: 28rem;
      line-height: 1.6;
      margin: 0 0 2.5rem;
    }
    .error-btn {
      display: inline-block;
      padding: 0.85rem 2.2rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--black, #0c0c0c);
      background: var(--gold, #c8a86e);
      border: none;
      border-radius: 0;
      text-decoration: none;
      transition: opacity 0.3s ease;
    }
    .error-btn:hover {
      opacity: 0.85;
    }
  </style>
</head>
<body>

  <main class="error-page">
    <div class="error-wordmark">SO</div>
    <h1 class="error-title" data-i18n="error.title">Page introuvable</h1>
    <p class="error-subtitle" data-i18n="error.subtitle">La page que vous cherchez n'existe pas ou a été déplacée.</p>
    <a href="index.html" class="error-btn" data-i18n="error.back">Retour à l'accueil</a>
  </main>

  <script src="js/i18n.js"></script>
</body>
</html>
